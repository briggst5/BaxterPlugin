name: Build Polarion MCP binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "polarion-mcp-v*"

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Linux + Windows Polarion MCP binaries
        working-directory: plugins/baxter-polarion
        run: |
          chmod +x scripts/build-polarion-binaries.sh
          ./scripts/build-polarion-binaries.sh

      - uses: actions/upload-artifact@v4
        with:
          name: polarion-mcp-binaries
          path: |
            plugins/baxter-polarion/bin/linux-x64/
            plugins/baxter-polarion/bin/win-x64/
